name: Build APK and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true

      - name: Create Flutter project structure with FORCE flag
        run: |
          echo "=========================================="
          echo "STEP 1: Creating Flutter Android structure"
          echo "=========================================="
          flutter create --platforms=android --force .
          echo ""
          echo "Flutter project structure created successfully"
          echo ""
          echo "Verifying created structure:"
          ls -la | head -20
          echo ""
          echo "Android folder contents:"
          ls -la android/
          echo ""
          echo "=========================================="

      - name: Verify Flutter installation
        run: |
          echo "Flutter version:"
          flutter --version
          echo ""
          echo "Java version:"
          java -version
          echo ""
          echo "Flutter doctor:"
          flutter doctor -v

      - name: Get Flutter dependencies
        run: |
          echo "Fetching Flutter dependencies..."
          flutter pub get
          echo "Dependencies fetched successfully"

      - name: Create .env file from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Creating .env file from secrets..."
          cat > .env << EOF
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          EOF
          echo ".env file created successfully"
          echo ""
          echo "Verifying .env:"
          cat .env

      - name: Verify project structure
        run: |
          echo "=========================================="
          echo "Project Structure Verification"
          echo "=========================================="
          echo ""
          [ -d "android" ] && echo "✓ android folder exists" || echo "✗ MISSING: android folder"
          [ -d "android/app" ] && echo "✓ android/app exists" || echo "✗ MISSING: android/app"
          [ -f "android/build.gradle" ] && echo "✓ android/build.gradle exists" || echo "✗ MISSING: android/build.gradle"
          [ -f "android/app/build.gradle" ] && echo "✓ android/app/build.gradle exists" || echo "✗ MISSING: android/app/build.gradle"
          [ -d "lib" ] && echo "✓ lib folder exists" || echo "✗ MISSING: lib folder"
          [ -f "pubspec.yaml" ] && echo "✓ pubspec.yaml exists" || echo "✗ MISSING: pubspec.yaml"
          [ -f ".env" ] && echo "✓ .env file exists" || echo "✗ MISSING: .env file"
          echo ""
          echo "Full directory structure:"
          ls -la
          echo ""
          echo "Android gradle files:"
          ls -la android/
          echo ""
          echo "=========================================="

      - name: Build APK (Debug)
        run: |
          echo "=========================================="
          echo "Building APK..."
          echo "=========================================="
          flutter build apk --debug
          echo ""
          echo "APK build completed"
          echo ""
          echo "Output APK:"
          ls -lh build/app/outputs/flutter-apk/app-debug.apk
          echo "=========================================="

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: v${{ github.run_number }}
          release_name: Mondo-Pelosetti APK v${{ github.run_number }}
          body: |
            Automatic build of Mondo-Pelosetti APK (Debug)
            
            Build Details:
            - Built on: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - Branch: ${{ github.ref }}
            - Commit: ${{ github.sha }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/app/outputs/flutter-apk/app-debug.apk
          asset_name: mondo-pelosetti-v${{ github.run_number }}-debug.apk
          asset_content_type: application/vnd.android.package-archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Success Summary
        if: success()
        run: |
          echo "=========================================="
          echo "✓ BUILD COMPLETED SUCCESSFULLY"
          echo "=========================================="
          echo ""
          echo "APK Details:"
          ls -lh build/app/outputs/flutter-apk/app-debug.apk
          echo ""
          echo "Download link available at:"
          echo "${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ github.run_number }}"
          echo ""
          echo "=========================================="

      - name: Build Failure Summary
        if: failure()
        run: |
          echo "=========================================="
          echo "✗ BUILD FAILED"
          echo "=========================================="
          echo ""
          echo "Check the logs above for details"
          echo ""
          echo "=========================================="
