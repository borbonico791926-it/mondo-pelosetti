name: Build APK and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true

      - name: Verify Flutter and Java installation
        run: |
          echo "Flutter version:"
          flutter --version
          echo ""
          echo "Java version:"
          java -version
          echo ""
          echo "Flutter doctor:"
          flutter doctor -v

      - name: Create Flutter blank app skeleton
        run: |
          echo "Creating Flutter app skeleton..."
          
          # Backup file personalizzati se esistono
          if [ -f pubspec.yaml ]; then
            cp pubspec.yaml pubspec.yaml.backup
          fi
          if [ -d lib ]; then
            cp -r lib lib.backup
          fi
          
          # Crea skeleton completo Flutter
          flutter create . --platforms android --org com.example
          
          # Ripristina file personalizzati
          if [ -f pubspec.yaml.backup ]; then
            mv pubspec.yaml.backup pubspec.yaml
          fi
          if [ -d lib.backup ]; then
            rm -rf lib
            mv lib.backup lib
          fi
          
          echo "Flutter skeleton created successfully"

      - name: Verify project structure
        run: |
          echo "Checking critical folders and files..."
          echo ""
          [ -d "android" ] && echo "✓ android folder exists" || echo "✗ MISSING: android folder"
          [ -d "lib" ] && echo "✓ lib folder exists" || echo "✗ MISSING: lib folder"
          [ -f "pubspec.yaml" ] && echo "✓ pubspec.yaml exists" || echo "✗ MISSING: pubspec.yaml"
          [ -d "android/app" ] && echo "✓ android/app exists" || echo "✗ MISSING: android/app"
          [ -f "android/build.gradle" ] && echo "✓ android/build.gradle exists" || echo "✗ MISSING: android/build.gradle"
          [ -f "android/app/build.gradle" ] && echo "✓ android/app/build.gradle exists" || echo "✗ MISSING: android/app/build.gradle"
          echo ""
          echo "Full directory structure:"
          ls -la

      - name: Get Flutter dependencies
        run: |
          echo "Fetching Flutter dependencies..."
          flutter pub get
          echo "Dependencies fetched successfully"

      - name: Create .env file from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Creating .env file..."
          cat > .env << EOF
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          EOF
          echo ".env file created successfully"

      - name: Build Flutter for Android (APK Debug)
        run: |
          echo "Building APK debug..."
          flutter build apk --debug
          echo "APK build completed"
          echo ""
          echo "Output APK location:"
          ls -lh build/app/outputs/flutter-apk/app-debug.apk

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: v${{ github.run_number }}
          release_name: Mondo-Pelosetti APK v${{ github.run_number }}
          body: |
            Automatic build of Mondo-Pelosetti APK (Debug)
            Built on: ${{ github.event.head_commit.timestamp }}
            Commit: ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/app/outputs/flutter-apk/app-debug.apk
          asset_name: mondo-pelosetti-v${{ github.run_number }}-debug.apk
          asset_content_type: application/vnd.android.package-archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        if: always()
        run: |
          echo "=========================================="
          echo "BUILD SUMMARY"
          echo "=========================================="
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          echo "Run Number: ${{ github.run_number }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          if [ -f build/app/outputs/flutter-apk/app-debug.apk ]; then
            echo "✓ APK built successfully"
            ls -lh build/app/outputs/flutter-apk/app-debug.apk
          else
            echo "✗ APK build failed - file not found"
          fi
          echo "=========================================="
