name: Build APK and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'

      - name: Verify Flutter installation
        run: flutter --version

      - name: Create Flutter project structure
        run: |
          # Se la cartella android non esiste, crea la struttura completa
          if [ ! -d "android" ]; then
            echo "Creating Flutter project structure..."
            flutter create . --platforms android,ios
            echo "Flutter project created successfully"
          else
            echo "Android folder already exists, skipping flutter create"
          fi

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Create .env file from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          cat > .env << EOF
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          EOF
          echo ".env file created"

      - name: Build APK (Debug)
        run: flutter build apk --debug

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: apk-v${{ github.run_number }}
          release_name: Mondo-Pelosetti APK v${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/app/outputs/flutter-apk/app-debug.apk
          asset_name: mondo-pelosetti-debug.apk
          asset_content_type: application/vnd.android.package-archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
