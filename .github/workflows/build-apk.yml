name: Build APK and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Ensure Flutter project structure
        run: |
          # If android/ios folders are missing, create them
          if [ ! -d "android" ] || [ ! -d "ios" ]; then
            flutter create .
          fi

      - name: Create .env from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "SUPABASE_URL=$SUPABASE_URL" > .env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --no-track-widget-creation

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: apk-build-${{ github.run_id }}
          release_name: Mondo-Pelosetti APK ${{ github.run_id }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/app/outputs/flutter-apk/app-debug.apk
          asset_name: mondo-pelosetti-app-debug.apk
          asset_content_type: application/vnd.android.package-archive
