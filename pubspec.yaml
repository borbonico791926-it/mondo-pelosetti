name: mondo_pelosetti
description: "Mondo Pelosetti - App per segnalare e trovare animali smarriti e feriti"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Material Design
  cupertino_icons: ^1.0.2

  # Supabase & Backend
  supabase_flutter: ^1.10.0
  supabase: ^1.10.0

  # Environment variables
  flutter_dotenv: ^5.1.0

  # HTTP & Networking
  http: ^1.1.0

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^9.0.2

  # Image handling
  image_picker: ^1.0.0
  image: ^4.0.0

  # Permissions
  permission_handler: ^11.4.0

  # URL Launcher
  url_launcher: ^6.1.0

  # State management
  provider: ^6.0.0

  # Utilities
  intl: ^0.19.0
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - .env

  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
        - asset: fonts/Roboto-Bold.ttf
          weight: 700
